name: Backfill Dashboard Reports

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "생성 시작일(YYYY-MM-DD). 예: 2026-05-01"
        required: true
        default: "2026-05-01"
      date_to:
        description: "생성 종료일(YYYY-MM-DD). 예: 2026-05-22"
        required: true
        default: "2026-05-22"

permissions:
  contents: write

concurrency:
  group: backfill-dashboard-reports-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill-dashboard-reports:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Normalize and validate date inputs
        env:
          RAW_DATE_FROM: ${{ github.event.inputs.date_from }}
          RAW_DATE_TO: ${{ github.event.inputs.date_to }}
        run: |
          python - <<'PY'
          import datetime as dt
          import os
          import re

          def normalize(name):
              raw = os.environ[name]
              value = re.sub(r"[+\s./]+", "-", raw.strip())
              try:
                  return dt.date.fromisoformat(value).isoformat()
              except ValueError:
                  raise SystemExit(f"ERROR: {name} must be YYYY-MM-DD; received: {raw!r}")

          date_from = normalize("RAW_DATE_FROM")
          date_to = normalize("RAW_DATE_TO")
          if date_from > date_to:
              raise SystemExit("ERROR: date_from must be earlier than or equal to date_to")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"DATE_FROM={date_from}\nDATE_TO={date_to}\n")
          print(f"[OK] normalized range: {date_from}..{date_to}")
          PY

      - name: Generate weekday reports for range
        run: |
          python scripts/generate_reports_range.py \
            --start "$DATE_FROM" \
            --end "$DATE_TO" \
            --skip-weekends \
            --skip-korean-holidays \
            --report-dir data/reports \
            --schedule-dir data/schedules \
            --price-dir data/prices \
            --history data/prices/history.json \
            --html-dir docs/reports \
            --index-out docs/report-index.json \
            --base-report report_sample.json \
            --chart-months 2 \
            --max-pages 80 \
            --result-file "$RUNNER_TEMP/backfill-results.json"

      - name: Validate report source separation
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          result_file = os.path.join(os.environ["RUNNER_TEMP"], "backfill-results.json")
          result = json.load(open(result_file, encoding="utf-8"))
          dates = result.get("generated_dates", [])
          for date_text in dates:
              subprocess.run([
                  sys.executable, "scripts/validate_report_sources.py",
                  "--date", date_text,
                  "--report-dir", "data/reports",
              ], check=True)
          print(f"[OK] generated report source validation passed: {len(dates)} target(s)")
          PY

      - name: Sync docs reports to public
        run: |
          mkdir -p public/reports
          cp -f docs/report-index.json public/report-index.json
          if compgen -G "docs/reports/*.html" > /dev/null; then
            cp -f docs/reports/*.html public/reports/
          fi

      - name: Validate public report HTML
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          result_file = os.path.join(os.environ["RUNNER_TEMP"], "backfill-results.json")
          result = json.load(open(result_file, encoding="utf-8"))
          dates = result.get("generated_dates", [])
          for date_text in dates:
              subprocess.run([
                  sys.executable, "scripts/validate_report_html.py",
                  "--reports-dir", "public/reports",
                  "--index", "public/report-index.json",
                  "--since", date_text,
                  "--date", date_text,
              ], check=True)
          print(f"[OK] generated public report HTML validation passed: {len(dates)} target(s)")
          PY

      - name: Commit backfilled reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/schedules/ data/reports/ data/news/ data/prices/ data/assembly/ docs/assembly/ docs/assembly-schedule-index.json docs/reports/ docs/report-index.json public/assembly/ public/assembly-schedule-index.json public/reports/ public/report-index.json || true

          if git diff --cached --quiet; then
            echo "변경된 파일이 없습니다."
            exit 0
          fi

          git commit -m "Backfill dashboard reports"
          git push
