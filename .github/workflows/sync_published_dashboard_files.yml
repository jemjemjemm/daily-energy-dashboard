name: Sync Published Dashboard Files

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Daily Energy Dashboard - Daily Data Pipeline
      - Backfill Dashboard Reports
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: sync-published-dashboard-files-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-published-dashboard-files:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Validate docs output
        run: |
          set -e
          test -f docs/index.html || (echo "ERROR: docs/index.html 없음" && exit 1)
          test -f docs/report-index.json || (echo "ERROR: docs/report-index.json 없음" && exit 1)
          test -d docs/reports || (echo "ERROR: docs/reports 폴더 없음" && exit 1)

          DOC_REPORT_COUNT=$(find docs/reports -maxdepth 1 -type f -name "*.html" | wc -l | tr -d ' ')
          echo "docs reports count: $DOC_REPORT_COUNT"

          if [ "$DOC_REPORT_COUNT" -lt 10 ]; then
            echo "ERROR: docs/reports HTML 파일 수가 너무 적습니다."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          idx = json.loads(Path("docs/report-index.json").read_text(encoding="utf-8"))
          text = Path("docs/report-index.json").read_text(encoding="utf-8")
          required = {"2026-05-04","2026-05-06","2026-05-08","2026-05-12","2026-05-18","2026-05-19","2026-05-20","2026-05-21"}
          missing = sorted([d for d in required if d not in text])
          if missing:
              raise SystemExit(f"ERROR: docs/report-index.json에 필수 날짜 누락: {missing}")
          for d in required:
              if not Path(f"docs/reports/{d}.html").exists():
                  raise SystemExit(f"ERROR: docs/reports/{d}.html 누락")
          print("[OK] docs 검증 완료")
          PY

      - name: Mirror docs to public
        run: |
          rm -rf public
          mkdir -p public
          cp -R docs/. public/

      - name: Validate public output
        run: |
          set -e
          test -f public/index.html || (echo "ERROR: public/index.html 없음" && exit 1)
          test -f public/report-index.json || (echo "ERROR: public/report-index.json 없음" && exit 1)
          test -d public/reports || (echo "ERROR: public/reports 폴더 없음" && exit 1)

          PUBLIC_REPORT_COUNT=$(find public/reports -maxdepth 1 -type f -name "*.html" | wc -l | tr -d ' ')
          echo "public reports count: $PUBLIC_REPORT_COUNT"

          python - <<'PY'
          from pathlib import Path
          text = Path("public/report-index.json").read_text(encoding="utf-8")
          required = {"2026-05-04","2026-05-06","2026-05-08","2026-05-12","2026-05-18","2026-05-19","2026-05-20","2026-05-21"}
          missing = sorted([d for d in required if d not in text])
          if missing:
              raise SystemExit(f"ERROR: public/report-index.json에 필수 날짜 누락: {missing}")
          for d in required:
              if not Path(f"public/reports/{d}.html").exists():
                  raise SystemExit(f"ERROR: public/reports/{d}.html 누락")
          html = Path("public/index.html").read_text(encoding="utf-8", errors="ignore")
          if "리포트 바로가기" not in html:
              raise SystemExit("ERROR: public/index.html이 최신 대시보드가 아닙니다.")
          print("[OK] public 검증 완료")
          PY

      - name: Commit synced public files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ || true

          if git diff --cached --quiet; then
            echo "변경된 public 파일이 없습니다."
            exit 0
          fi

          git commit -m "Sync public dashboard files"

          if git push; then
            echo "정상적으로 push 완료"
            exit 0
          fi

          git fetch origin main
          git reset --soft origin/main
          git add public/ || true

          if git diff --cached --quiet; then
            echo "최신 원격 기준으로 추가 변경이 없습니다."
            exit 0
          fi

          git commit -m "Sync public dashboard files"
          git push
