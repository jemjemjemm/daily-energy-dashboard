name: Sync published dashboard files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'public/**'
      - 'data/reports/**'
      - 'scripts/generate_report_index.py'
      - 'scripts/generate_html_report.py'
      - 'scripts/generate_schedule_detail_html.py'
      - '.github/workflows/sync_published_dashboard_files.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure report directories
        run: |
          mkdir -p docs/reports docs/schedules public/reports public/schedules data/reports

      - name: Generate docs report index
        run: |
          python scripts/generate_report_index.py \
            --reports-dir docs/reports \
            --out docs/report-index.json

      - name: Copy docs to public
        run: |
          mkdir -p public/reports public/schedules
          cp -f docs/report-index.json public/report-index.json
          if compgen -G "docs/reports/*.html" > /dev/null; then
            cp -f docs/reports/*.html public/reports/
          fi
          if compgen -G "docs/schedules/*.html" > /dev/null; then
            cp -f docs/schedules/*.html public/schedules/
          fi

      - name: Validate published report index
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          idx_path = Path('docs/report-index.json')
          pub_idx_path = Path('public/report-index.json')

          if not idx_path.exists():
              raise SystemExit('[ERROR] docs/report-index.json 없음')
          if not pub_idx_path.exists():
              raise SystemExit('[ERROR] public/report-index.json 없음')

          docs_idx = json.loads(idx_path.read_text(encoding='utf-8'))
          public_idx = json.loads(pub_idx_path.read_text(encoding='utf-8'))

          if docs_idx.get('count', 0) <= 0:
              raise SystemExit('[ERROR] report-index count가 0입니다. 리포트 전체 미노출 위험')
          if docs_idx.get('reports') != public_idx.get('reports'):
              raise SystemExit('[ERROR] docs/public report-index 내용 불일치')

          for item in docs_idx.get('reports', []):
              url = item.get('url', '')
              if not url.startswith('reports/'):
                  raise SystemExit(f'[ERROR] 잘못된 report url: {url}')
              docs_html = Path('docs') / url
              public_html = Path('public') / url
              if not docs_html.exists():
                  raise SystemExit(f'[ERROR] index에는 있으나 docs HTML 없음: {docs_html}')
              if not public_html.exists():
                  raise SystemExit(f'[ERROR] index에는 있으나 public HTML 없음: {public_html}')

          print(f"[OK] published report index validated: {docs_idx.get('count')} reports")
          PY

      - name: Check unindexed report HTML without deleting
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          idx = json.loads(Path('docs/report-index.json').read_text(encoding='utf-8'))
          keep = {
              Path(item['url']).name
              for item in idx.get('reports', [])
              if isinstance(item, dict) and item.get('url', '').startswith('reports/')
          }

          unindexed = []
          for html in sorted(Path('docs/reports').glob('*.html')):
              if html.name not in keep:
                  unindexed.append(html.name)

          print(f'[WARN] unindexed HTML count: {len(unindexed)}')
          if unindexed:
              print('\n'.join(unindexed))
          print('[OK] 미등록 HTML은 삭제하지 않고 경고만 출력함')
          PY

      - name: Validate no destructive stale deletion step
        run: |
          if grep -R "rm -f docs/reports\|rm -f public/reports\|Remove unindexed stale report HTML" .github/workflows --exclude=sync_published_dashboard_files.yml; then
            echo "[ERROR] 리포트 HTML 삭제 로직이 workflow에 남아 있습니다."
            exit 1
          fi
          echo "[OK] destructive stale report deletion step not found"

      - name: Commit synchronized files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/report-index.json public/report-index.json public/reports public/schedules docs/reports docs/schedules
            git commit -m "Sync published dashboard report files"
            git push
          else
            echo "[OK] No changes to commit"
          fi
